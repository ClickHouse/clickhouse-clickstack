name: Tag and Release

on:
  push:
    branches:
      - main
    paths:
      - 'HYPERDX_VERSION'

jobs:
  tag-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CH_BOT_PAT }}

      - name: Get version
        id: version
        run: |
          VERSION=$(cat HYPERDX_VERSION)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check-tag
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.version.outputs.version }} already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag
        if: steps.check-tag.outputs.exists != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.version }}" -m "Sync HyperDX ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        if: steps.check-tag.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.CH_BOT_PAT }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --title "HyperDX ${{ steps.version.outputs.version }}" \
            --notes "$(cat <<EOF
          Synced from [hyperdxio/hyperdx@${{ steps.version.outputs.version }}](https://github.com/hyperdxio/hyperdx/releases/tag/@hyperdx/app@${{ steps.version.outputs.version }}).

          **Changes:**
          - Updated HyperDX to ${{ steps.version.outputs.version }}
          - Built static files available in \`out/\` directory

          See [upstream release](https://github.com/hyperdxio/hyperdx/releases/tag/@hyperdx/app@${{ steps.version.outputs.version }}) for details.
          EOF
          )"
