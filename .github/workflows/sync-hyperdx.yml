name: Sync HyperDX Release

on:
  # Manual trigger with required tag
  workflow_dispatch:
    inputs:
      tag:
        description: 'HyperDX release tag (e.g., @hyperdx/app@2.16.0)'
        required: true
        type: string

jobs:
  build-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CH_BOT_PAT }}

      - name: Determine HyperDX version
        id: version
        run: |
          # Priority: workflow_dispatch input > repository_dispatch payload
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
            echo "Using tag from workflow input: $TAG"
          else
            echo "Error: TAG is required"
            exit 1
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Check if version already synced
        id: check
        run: |
          SKIP=$(make check-version TAG="${{ steps.version.outputs.tag }}")
          echo "Check result: $SKIP"
          echo "$SKIP" >> $GITHUB_OUTPUT

          if [ "$SKIP" = "skip=true" ]; then
            echo "Version ${{ steps.version.outputs.tag }} already synced"
          fi

      - name: Fetch Node.js version from HyperDX
        id: node-version
        if: steps.check.outputs.skip != 'true'
        run: |
          NODE_VERSION=$(curl -s https://raw.githubusercontent.com/hyperdxio/hyperdx/@hyperdx/app@${{ steps.version.outputs.tag }}/.nvmrc)
          echo "Node version: $NODE_VERSION"
          echo "version=$NODE_VERSION" >> $GITHUB_OUTPUT

      - name: Set up Node.js
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node-version.outputs.version }}

      - name: Run sync via Makefile
        if: steps.check.outputs.skip != 'true'
        run: |
          make sync TAG=${{ steps.version.outputs.tag }}

      - name: Get synced version
        if: steps.check.outputs.skip != 'true'
        id: synced
        run: |
          VERSION=$(cat HYPERDX_VERSION)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Synced version: $VERSION"

      - name: Commit and push branch
        if: steps.check.outputs.skip != 'true'
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add out HYPERDX_VERSION

          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "pushed=false" >> $GITHUB_OUTPUT
          else
            BRANCH="sync/hyperdx-${{ steps.synced.outputs.version }}"
            git checkout -b "$BRANCH"
            git commit -m "$(cat <<'EOF'
          chore: sync HyperDX ${{ steps.synced.outputs.version }}

          Built from hyperdxio/hyperdx@${{ steps.synced.outputs.version }}
          EOF
          )"
            git push -u origin "$BRANCH"
            echo "pushed=true" >> $GITHUB_OUTPUT
            echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          fi

      - name: Create pull request
        if: steps.check.outputs.skip != 'true' && steps.push.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.CH_BOT_PAT }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.push.outputs.branch }}" \
            --title "chore: sync HyperDX ${{ steps.synced.outputs.version }}" \
            --body "$(cat <<EOF
          ## Summary
          - Synced HyperDX to ${{ steps.synced.outputs.version }}
          - Built from [hyperdxio/hyperdx@${{ steps.synced.outputs.version }}](https://github.com/hyperdxio/hyperdx/releases/tag/@hyperdx/app@${{ steps.synced.outputs.version }})

          Merging this PR will automatically create a tag and GitHub release.
          EOF
          )"

      - name: Determine deploy status
        if: steps.check.outputs.skip != 'true' && always()
        id: status
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "status=succeeded" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
          fi

      - name: Slack Notification
        if: steps.check.outputs.skip != 'true' && always()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          fields: repo,workflow,commit,author
          custom_payload: |
            {
              "text": "ClickStack Embedded release ${{ steps.status.outputs.status }}",
              "attachments": [{
                "color": "${{ steps.status.outputs.color }}",
                "fields": [
                  {
                    "title": "Status",
                    "value": "${{ steps.status.outputs.status }}",
                    "short": true
                  },
                  {
                    "title": "Version",
                    "value": "${{ steps.synced.outputs.version || steps.version.outputs.tag }}",
                    "short": true
                  },
                  {
                    "title": "Commit",
                    "value": "<https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>",
                    "short": false
                  },
                  {
                    "title": "Author",
                    "value": "${{ github.actor }}",
                    "short": true
                  }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_HYPERDX_NOTIFS }}

      - name: Create summary
        if: always()
        run: |
          echo "## HyperDX Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "HYPERDX_VERSION" ]; then
            CURRENT=$(cat HYPERDX_VERSION)
            echo "- **Current Version:** $CURRENT" >> $GITHUB_STEP_SUMMARY
          fi

          echo "- **Target:** ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Skipped:** ${{ steps.check.outputs.skip == 'skip=true' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.push.outputs.pushed }}" = "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "PR created for HyperDX ${{ steps.synced.outputs.version }}. Tag and release will be created on merge." >> $GITHUB_STEP_SUMMARY
          fi
